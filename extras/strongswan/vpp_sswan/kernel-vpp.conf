kernel-vpp {

    # Whether to load the plugin. Can also be an integer to increase the
    # priority of this plugin.
    load = yes

    # Route-based IPsec mode. When yes, policies are installed by binding
    # SAs to a shared p2mp ipsec-itf via ipsec_tunnel_protect_update, and
    # a FIB route is added per traffic selector via that interface with
    # the peer as next-hop. When no (default), SPD entries are installed
    # as before. Switching is plugin-wide; gateways cannot mix modes in
    # the same charon process.
    route_mode = no

    # VPP interface name whose IPv4 address the ipsec-itf should borrow
    # via 'set interface unnumbered'. Without this, the ipsec-itf has no
    # IP context, and decrypted inner packets drop at ip4-not-enabled.
    # Typically the WAN interface that terminates IPsec (e.g.,
    # vmxnet3-0/2/5/0, GigabitEthernet0/0/0). Only used when route_mode = yes.
    # wan_interface = vmxnet3-0/2/5/0

    # Whether to install SAs with tunnel flag. Disabling this can be useful
    # in some scenarios e.g. using SAs with custom encap interfaces.
    # The default TRUE is correct for both spd-mode (transport-mode SAs
    # negotiated with tunnel selectors get IS_TUNNEL flag) and route-mode
    # (ipsec-itf with tunnel-protect requires tunnel-mode SAs).
    # use_tunnel_mode_sa = yes

}
